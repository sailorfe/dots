[env]
term = "xterm-256color"

[window]
dimensions = { columns = 120, lines = 28 }
padding = { x = 12, y = 0}

[colors]
draw_bold_text_with_bright_colors = true

[general]
import = ["~/.config/alacritty/themes/${THEME_NAME}.toml"]

[font]
normal = { family = "Rec Mono Casual", style = "Regular" }
size = 11.0
