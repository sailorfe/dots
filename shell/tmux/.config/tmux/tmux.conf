# --------------------------------------------------------------------// general

set -q -g status-utf8 on
setw -q -g utf8 on

set -g history-limit 5000

# -----------------------------------------------------------------// navigation

set -g mouse on
setw -g mode-keys vi

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# --------------------------------------------------------------------// display

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

set -g display-panes-time 1000
set -g display-time 1000

set -g status-interval 10

# -----------------------------------------------------------------// appearance

set -g default-terminal "tmux-256color"
set-option -sa terminal-features ",alacritty:RGB"

# -*- mute bell
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# -*- clock mode
setw -g clock-mode-colour "magenta"

# -*- copy mode
setw -g mode-style "fg=black bg=brightyellow"

# -*- panes
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=brightcyan"

# -*- statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=cyan"

set -g status-left " #H – #S "
set -g status-left-style "bg=black fg=brightwhite"
set -g status-left-length 30

set -g status-interval 10
set -g status-right '#(~/.config/tmux/status.sh) %Y-%m-%d %H:%M '
set -g status-right-length 60

setw -g window-status-current-style "fg=black bg=blue"
setw -g window-status-current-format ' #W '

setw -g window-status-style "fg=black bg=cyan"
setw -g window-status-format ' #W '

setw -g window-status-bell-style "fg=brightwhite bg=brightred"

# -*- messages
set -g message-style "fg=blue bg=black"
