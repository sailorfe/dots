[main]
term=xterm-256color
pad=12x0
font=RecMono Casual:size=10.0
bold-text-in-bright=yes
initial-window-size-chars = 120x28

#[colors]
#alpha=0.9

[scrollback]
lines=100000

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste

[bell]
command=pw-play /usr/share/sounds/freedesktop/stereo/bell.oga
command-focused=yes
notify=no
visual=no

#-*- luna

