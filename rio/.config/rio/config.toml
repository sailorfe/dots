theme = "luna"
padding-x = 12
padding-y = [0, 0]

[editor]
program = "nvim"

[fonts]
family = "Rec Mono Casual"
size = 16

[navigation]
mode = "toptab"
clickable = true
hide-if-single = true
use-current-path = false
color-automation = []

[bindings]
keys = [
  { key = "esc", mode = "~vi", action = "ToggleVIMode" },
]
